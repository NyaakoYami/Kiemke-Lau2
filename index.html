<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Kê Tài Sản - Sàn Lầu 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* ─── KEYFRAMES ─── */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.85);
                opacity: 0;
            }

            70% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -400px 0;
            }

            100% {
                background-position: 400px 0;
            }
        }

        @keyframes countUp {
            from {
                transform: translateY(8px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(60px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastFade {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(60px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes headerGlow {

            0%,
            100% {
                box-shadow: 0 8px 40px rgba(59, 91, 219, .25);
            }

            50% {
                box-shadow: 0 8px 40px rgba(112, 72, 232, .35);
            }
        }

        :root {
            --bg: #f0f2f7;
            --surface: #fff;
            --surface-alt: #f8f9fc;
            --border: #e2e6ef;
            --text-primary: #1a1d2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --blue: #3b5bdb;
            --blue-light: #eef2ff;
            --blue-dark: #2f4ac0;
            --green: #2f9e44;
            --green-light: #ebfbee;
            --red: #e03131;
            --red-light: #fff5f5;
            --yellow: #f59f00;
            --yellow-light: #fff9db;
            --purple: #7048e8;
            --pink-bg: #fff0f6;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .08), 0 2px 4px rgba(0, 0, 0, .04);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, .14);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: .18s cubic-bezier(.4, 0, .2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1640px;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        .page-header {
            background: linear-gradient(135deg, #1a1d2e 0%, #2d3561 55%, #3b5bdb 100%);
            border-radius: 16px;
            padding: 28px 36px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-xl);
            animation: fadeInDown .55s ease both, headerGlow 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .page-header-left h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .page-header-left p {
            color: rgba(255, 255, 255, .65);
            font-size: 13px;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-badge {
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .22);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ─── STAT CARDS ─── */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 10px 13px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeInUp .45s ease both;
        }

        .stat-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }

        .stat-icon.blue {
            background: var(--blue-light);
        }

        .stat-icon.green {
            background: var(--green-light);
        }

        .stat-icon.red {
            background: var(--red-light);
        }

        .stat-icon.yellow {
            background: var(--yellow-light);
        }

        .stat-icon.purple {
            background: #f3f0ff;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        /* ─── CONTROLS ─── */
        .controls-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap input {
            padding: 9px 12px 9px 36px;
            width: 280px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            outline: none;
            background: var(--surface-alt);
        }

        .search-wrap input:focus {
            border-color: var(--blue);
        }

        .search-wrap .icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
        }

        .btn-success {
            background: var(--green);
            color: #fff;
        }

        .btn-warning {
            background: var(--yellow);
            color: #fff;
        }

        .btn-danger {
            background: #fff;
            color: var(--red);
            border: 1px solid #fca5a5;
        }

        .btn-sync {
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            color: #fff;
        }

        #sync-status-badge {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* ─── LAYOUT GRID ─── */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 38px 1fr 1fr 38px 1fr;
            gap: 12px;
            margin-bottom: 4px;
        }

        .aisle {
            background: linear-gradient(180deg, #e9ecef, #dee2e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #8a9ab0;
            border-radius: 6px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 11px;
            border: 1px dashed #c8d0db;
        }

        .col-wrapper {
            display: flex;
            flex-direction: column;
        }

        .seat-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 60px;
        }

        .column-main-header {
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        /* ─── SEAT BOX ─── */
        .seat-box {
            border-radius: var(--radius);
            padding: 10px 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .seat-box:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .seat-box.empty-space {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            height: 40px;
            pointer-events: none;
        }

        .fill-purple {
            background-color: #f0ebff;
            border-color: #c5b4f5;
        }

        .fill-green {
            background-color: var(--green-light);
            border-color: #b2f2bb;
        }

        .fill-yellow {
            background-color: var(--yellow-light);
            border-color: #ffe066;
        }

        .fill-red {
            background-color: var(--red-light);
            border-color: #fca5a5;
        }

        .fill-pink {
            background-color: var(--pink-bg);
            border-color: #fbb6ce;
        }

        /* ─── SEAT HEADER ─── */
        .seat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 6px;
        }

        .seat-name {
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            padding: 2px 4px;
            display: flex;
            align-items: center;
        }

        .seat-name:hover {
            background: rgba(0, 0, 0, .05);
        }

        .rename-input {
            font-weight: 700;
            font-size: 12px;
            border: 1.5px solid var(--blue);
            border-radius: 4px;
            padding: 2px 5px;
            outline: none;
            width: 100%;
            animation: popIn .2s ease;
        }

        /* mini buttons */
        .btn-action-group {
            display: flex;
            gap: 4px;
        }

        .btn-mini {
            padding: 4px 8px;
            font-size: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn-mini-success {
            background: var(--green);
            color: #fff;
        }

        .btn-mini-danger {
            background: #e5e7eb;
            color: #6b7280;
        }

        .btn-mini-danger:hover {
            background: #fca5a5;
            color: var(--red);
        }

        /* ─── ITEMS GRID ─── */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            background: rgba(255, 255, 255, .7);
            padding: 7px 8px;
            border-radius: var(--radius-sm);
        }

        .item-check {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .item-check input[type=checkbox] {
            cursor: pointer;
            width: 14px;
            height: 14px;
            accent-color: var(--green);
        }

        .qty-input {
            width: 36px;
            padding: 1px 3px;
            font-size: 10px;
            border: 1px solid var(--border);
            border-radius: 3px;
            text-align: center;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .col-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: center;
        }

        .btn-col-action {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            background: var(--surface);
            color: var(--text-secondary);
        }

        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #1a1d2e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow-xl);
            z-index: 9999;
            display: none;
            border-left: 4px solid var(--blue);
        }

        #toast.show {
            display: block;
            animation: toastSlide .3s ease;
        }

        #toast.hide {
            animation: toastFade .3s ease forwards;
        }

        .spin {
            display: inline-block;
            animation: spin .7s linear infinite;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h1>Kiểm Kê Tài Sản - Sàn Lầu 2</h1>
                <p>Hệ thống quản lý sơ đồ và thiết bị phần cứng chỗ ngồi</p>
            </div>
            <div class="header-right">
                <span class="header-badge" id="date-badge"></span>
            </div>
        </div>

        <div class="detail-grid">
            <div class="stat-card">
                <div class="stat-icon blue">📦</div>
                <div class="stat-label">Thùng Máy Tính</div>
                <div class="stat-value" id="count-thung">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">🖥️</div>
                <div class="stat-label">Màn hình 20"</div>
                <div class="stat-value" id="count-man20">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">🖥️✨</div>
                <div class="stat-label">Màn hình 24"</div>
                <div class="stat-value" id="count-man24">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">🖱️</div>
                <div class="stat-label">Tổng Chuột</div>
                <div class="stat-value" id="count-chuot">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon yellow">⌨️</div>
                <div class="stat-label">Tổng Phím</div>
                <div class="stat-value" id="count-phim">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">🎧</div>
                <div class="stat-label">Tai nghe USB</div>
                <div class="stat-value" id="count-tai">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">💻</div>
                <div class="stat-label">Laptop + Sạc + chuột</div>
                <div class="stat-value" id="count-laptop">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">💻💼</div>
                <div class="stat-label">Laptop + Sạc + chuột + túi</div>
                <div class="stat-value" id="count-laptop-tui">0</div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="search-wrap">
                <span class="icon">🔍</span>
                <input type="text" id="search-input" placeholder="Tìm kiếm tên nhân viên..." oninput="searchEmployee()">
            </div>
            <div class="btn-group">
                <div id="sync-status-badge">💾 Sẵn sàng</div>
                <button class="btn btn-sync" id="btn-sync" onclick="syncNow()">☁️ Đồng bộ ngay</button>
                <button class="btn btn-primary" onclick="exportJSON()">💾 Xuất JSON</button>
                <button class="btn btn-success" onclick="exportExcel()"
                    style="background:#51cf66; border-color:#37b24d;">📊 Xuất Excel</button>
                <button class="btn btn-warning" onclick="document.getElementById('file-json').click()">📂 Nhập
                    JSON</button>
                <input type="file" id="file-json" accept=".json" style="display:none" onchange="importJSON(event)">
                <button class="btn btn-warning" onclick="document.getElementById('file-excel').click()"
                    style="background:#ffa94d; border-color:#fd7e14;">📊 Nhập Excel</button>
                <input type="file" id="file-excel" accept=".xls,.xlsx,.csv" style="display:none"
                    onchange="importExcel(event)">
                <button class="btn btn-danger" onclick="resetAllInventory()">🗑️ Reset Toàn Bộ</button>
            </div>
        </div>

        <div class="layout-grid" id="header-grid">
            <div id="leader-header-1"></div>
            <div class="aisle">LỐI ĐI</div>
            <div id="leader-header-2a"></div>
            <div id="leader-header-2b"></div>
            <div class="aisle">LỐI ĐI</div>
            <div id="leader-header-3"></div>
        </div>

        <div class="layout-grid" id="main-grid">
            <div class="col-wrapper">
                <div class="column-main-header" style="background:#eef2ff; color:#3b5bdb; border-color:#bac8ff;">A</div>
                <div class="seat-column" id="col-1"></div>
            </div>
            <div class="aisle">LỐI ĐI</div>
            <div class="col-wrapper">
                <div class="column-main-header" style="background:#fff5f5; color:#e03131; border-color:#fca5a5;">B</div>
                <div class="seat-column" id="col-2a"></div>
            </div>
            <div class="col-wrapper">
                <div class="column-main-header" style="background:#fff0f6; color:#c2255c; border-color:#fbb6ce;">C</div>
                <div class="seat-column" id="col-2b"></div>
            </div>
            <div class="aisle">LỐI ĐI</div>
            <div class="col-wrapper">
                <div class="column-main-header" style="background:#f3f0ff; color:#7048e8; border-color:#d0bfff;">D</div>
                <div class="seat-column" id="col-3"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script>
        document.getElementById('date-badge').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        const STORAGE_KEY = 'inventoryDataV2';

        // Khởi tạo Dữ liệu gốc
        let customNames = {};
        let inventoryState = {};
        let columnOrder = { col1: [], col2a: [], col2b: [], col3: [] };
        let layoutData = {
            leaders: [
                { id: "L1", name: "A", count: "18", targetId: "leader-header-1", fill: "fill-purple", team: "LAN_PHUONG" },
                { id: "L2A", name: "B", count: "20", targetId: "leader-header-2a", fill: "fill-purple", team: "OTHER" },
                { id: "L2B", name: "C", count: "20", targetId: "leader-header-2b", fill: "fill-purple", team: "OTHER" },
                { id: "L3", name: "D", count: "19", targetId: "leader-header-3", fill: "fill-purple", team: "TRAN_OANH" }
            ],
            col1: [
                { id: "1_1", name: "CHỖ TRỐNG", fill: "fill-purple" }, { id: "1_2", name: "MINH NHỰT", fill: "fill-purple" }, { id: "1_3", name: "ĐAN VY", fill: "fill-purple" }, { id: "1_4", name: "LONG NHÂN", fill: "fill-green" }, { id: "1_5", name: "TÁN PHÚC", fill: "fill-green" }, { id: "1_blank1", name: "", fill: "empty-space" }, { id: "1_6", name: "TRỰC", fill: "fill-purple" }, { id: "1_7", name: "THẮNG", fill: "fill-purple" }, { id: "1_8", name: "KIM NGÂN", fill: "fill-purple" }, { id: "1_9", name: "NHẬT KHÁNH", fill: "fill-purple" }, { id: "1_10", name: "PHÚ SĨ SENIOR", fill: "fill-yellow" }, { id: "1_11", name: "CHÍNH SENIOR", fill: "fill-yellow" }, { id: "1_blank2", name: "", fill: "empty-space" }, { id: "1_12", name: "PT - PHƯƠNG THẢO", fill: "fill-purple" }, { id: "1_13", name: "TÂN TÀI", fill: "fill-purple" }, { id: "1_14", name: "TUẤN ANH", fill: "fill-purple" }, { id: "1_15", name: "QUANG HẬU", fill: "fill-purple" }, { id: "1_16", name: "MINH HOÀNG", fill: "fill-purple" }, { id: "1_17", name: "CHỖ TRỐNG", fill: "fill-purple" }, { id: "1_18", name: "TOÀN", fill: "fill-purple" }
            ],
            col2a: [
                { id: "2a_1", name: "CHỖ TRỐNG", fill: "fill-red" }, { id: "2a_2", name: "PT - KIM NGÂN", fill: "fill-purple" }, { id: "2a_3", name: "CHỖ TRỐNG", fill: "fill-red" }, { id: "2a_4", name: "PT - NHỊ CẮM", fill: "fill-purple" }, { id: "2a_5", name: "PT - DIỄM MY", fill: "fill-purple" }, { id: "2a_6", name: "PT - PHỤNG NHI", fill: "fill-purple" }, { id: "2a_7", name: "PT - TRÍ PHI", fill: "fill-purple" }, { id: "2a_8", name: "THÀNH ĐẠT", fill: "fill-purple" }, { id: "2a_9", name: "THU HIỀN", fill: "fill-purple" }, { id: "2a_10", name: "HOÀNG MỸ", fill: "fill-purple" }, { id: "2a_11", name: "THẢO TRÂM", fill: "fill-purple" }, { id: "2a_12", name: "THỊ THỦY", fill: "fill-purple" }, { id: "2a_13", name: "Ý LAN", fill: "fill-purple" }, { id: "2a_14", name: "THỪA NGHIÊN", fill: "fill-purple" }, { id: "2a_15", name: "NGUYỄN NHI", fill: "fill-purple" }, { id: "2a_16", name: "HUYỀN TRANG", fill: "fill-purple" }, { id: "2a_17", name: "MINH THÁI", fill: "fill-purple" }, { id: "2a_18", name: "BẢO ANH SENIOR", fill: "fill-yellow" }, { id: "2a_19", name: "PT - PHƯƠNG THY", fill: "fill-pink" }, { id: "2a_20", name: "PT - LIÊN ANH", fill: "fill-pink" }
            ],
            col2b: [
                { id: "2b_1", name: "THIÊN NGÂN", fill: "fill-pink" }, { id: "2b_2", name: "TÚ TRINH", fill: "fill-pink" }, { id: "2b_3", name: "TRUNG NGHỊ", fill: "fill-pink" }, { id: "2b_4", name: "MINH TÂM", fill: "fill-pink" }, { id: "2b_5", name: "MINH THƯ", fill: "fill-pink" }, { id: "2b_6", name: "DUY KHÁNH", fill: "fill-pink" }, { id: "2b_7", name: "HỒNG ÂN", fill: "fill-pink" }, { id: "2b_8", name: "THIÊN KIM", fill: "fill-yellow" }, { id: "2b_9", name: "MINH SENIOR", fill: "fill-yellow" }, { id: "2b_10", name: "KHÁNH LY", fill: "fill-pink" }, { id: "2b_11", name: "NHẬT LAM", fill: "fill-pink" }, { id: "2b_12", name: "HÂN SENIOR", fill: "fill-yellow" }, { id: "2b_13", name: "NGUYỄN SENIOR", fill: "fill-yellow" }, { id: "2b_14", name: "DIỆU TRINH", fill: "fill-pink" }, { id: "2b_15", name: "PHI PHỤNG", fill: "fill-pink" }, { id: "2b_16", name: "PT - QUỐC THỊNH", fill: "fill-purple" }, { id: "2b_17", name: "PT - THU HỒNG", fill: "fill-purple" }, { id: "2b_18", name: "PT - KHOA", fill: "fill-pink" }, { id: "2b_19", name: "PT - LOAN", fill: "fill-pink" }, { id: "2b_20", name: "KIM CHI", fill: "fill-purple" }
            ],
            col3: [
                { id: "C3_1782579850790", name: "Vị trí mới", fill: "fill-purple" }, { id: "3_1", name: "BẢO NGỌC", fill: "fill-pink" }, { id: "3_2", name: "HOÀNG KHẢI", fill: "fill-pink" }, { id: "3_3", name: "TRUNG HIẾU", fill: "fill-pink" }, { id: "3_4", name: "PT - CÁT TƯỜNG", fill: "fill-pink" }, { id: "3_5", name: "HUY HOÀNG", fill: "fill-pink" }, { id: "3_blank1", name: "", fill: "empty-space" }, { id: "3_6", name: "MINH TRÍ", fill: "fill-pink" }, { id: "3_7", name: "PT - CẨM TÚ", fill: "fill-pink" }, { id: "3_8", name: "MINH ĐẠO", fill: "fill-purple" }, { id: "3_9", name: "PT - PHÚC HẬU", fill: "fill-purple" }, { id: "3_10", name: "BẢO AN", fill: "fill-purple" }, { id: "3_11", name: "PT - VĂN VIỆT", fill: "fill-purple" }, { id: "3_blank2", name: "", fill: "empty-space" }, { id: "3_12", name: "THẢO VI", fill: "fill-purple" }, { id: "3_13", name: "NHƯ XUYẾN", fill: "fill-purple" }, { id: "3_14", name: "THU THẢO", fill: "fill-purple" }, { id: "3_15", name: "MAI XUÂN", fill: "fill-purple" }, { id: "3_16", name: "THỊ HỒNG", fill: "fill-purple" }, { id: "3_17", name: "THỊ QUỲNH", fill: "fill-purple" }, { id: "3_18", name: "CÔNG HIỆP", fill: "fill-purple" }
            ]
        };

        const colMeta = {
            col1: { domId: 'col-1', prefix: 'C1' },
            col2a: { domId: 'col-2a', prefix: 'C2A' },
            col2b: { domId: 'col-2b', prefix: 'C2B' },
            col3: { domId: 'col-3', prefix: 'C3' }
        };

        function initDefaultData() {
            ['col1', 'col2a', 'col2b', 'col3'].forEach(k => {
                columnOrder[k] = layoutData[k].map(s => s.id);
                layoutData[k].forEach(s => { if (s.id.indexOf('blank') === -1) initSeatState(s.id); });
            });
            layoutData.leaders.forEach(s => initSeatState(s.id));
        }

        function initSeatState(id) {
            inventoryState[id] = {
                thung: false, thung_qty: 1, man20: false, man24: false, chuot: false, chuot_qty: 1,
                phim: false, phim_qty: 1, tai: false, tai_qty: 1, laptop: false, laptop_tui: false
            };
        }

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.columnOrder) columnOrder = data.columnOrder;
                    if (data.layoutData) layoutData = data.layoutData;
                    if (data.inventoryState) inventoryState = data.inventoryState;
                    if (data.customNames) customNames = data.customNames;
                } catch (e) { initDefaultData(); }
            } else {
                initDefaultData();
            }
            renderAll();
        }

        function saveLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ columnOrder, layoutData, inventoryState, customNames }));
            updateSyncStatus('unsynced');
            updateCounts();
        }

        function updateSyncStatus(status) {
            const badge = document.getElementById('sync-status-badge');
            if (!badge) return;
            const now = new Date().toLocaleTimeString('vi-VN');
            if (status === 'unsynced') {
                badge.innerHTML = `💾 Lưu lúc ${now} <span style="color:var(--yellow); font-weight:700;">• Chưa đồng bộ</span>`;
            } else if (status === 'syncing') {
                badge.innerHTML = `⏳ Đang cập nhật...`;
            } else if (status === 'synced') {
                badge.innerHTML = `✅ Đã đồng bộ lúc ${now}`;
            }
        }

        function syncNow() {
            updateSyncStatus('syncing');
            const btn = document.getElementById('btn-sync');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spin">⏳</span> Đang đồng bộ...';

            // Mô phỏng thao tác đồng bộ
            setTimeout(() => {
                updateSyncStatus('synced');
                btn.innerHTML = oldHtml;
                showToast('Đồng bộ thành công!', 'success');
            }, 1200);
        }

        function getItemsHtml(seatId, state, isLeader) {
            if (!state) return '';
            let html = `
            <label class="item-check">
                <input type="checkbox" onchange="updateItem('${seatId}','thung',this.checked)" ${state.thung ? 'checked' : ''}> Thùng
                <input type="number" class="qty-input" value="${state.thung_qty || 1}" onchange="updateQty('${seatId}','thung_qty',this.value)">
            </label>
            <label class="item-check">
                <input type="checkbox" onchange="updateItem('${seatId}','man20',this.checked)" ${state.man20 ? 'checked' : ''}> Màn 20"
            </label>
        `;

            if (isLeader) {
                html += `
                <label class="item-check">
                    <input type="checkbox" onchange="updateItem('${seatId}','man24',this.checked)" ${state.man24 ? 'checked' : ''}> Màn 24"
                </label>
            `;
            }

            html += `
            <label class="item-check">
                <input type="checkbox" onchange="updateItem('${seatId}','chuot',this.checked)" ${state.chuot ? 'checked' : ''}> Chuột
                <input type="number" class="qty-input" value="${state.chuot_qty || 1}" onchange="updateQty('${seatId}','chuot_qty',this.value)">
            </label>
            <label class="item-check">
                <input type="checkbox" onchange="updateItem('${seatId}','phim',this.checked)" ${state.phim ? 'checked' : ''}> Phím
                <input type="number" class="qty-input" value="${state.phim_qty || 1}" onchange="updateQty('${seatId}','phim_qty',this.value)">
            </label>
            <label class="item-check">
                <input type="checkbox" onchange="updateItem('${seatId}','tai',this.checked)" ${state.tai ? 'checked' : ''}> Tai USB
                <input type="number" class="qty-input" value="${state.tai_qty || 1}" onchange="updateQty('${seatId}','tai_qty',this.value)">
            </label>
        `;

            if (isLeader) {
                html += `
                <label class="item-check" style="grid-column: span 2;">
                    <input type="checkbox" onchange="updateItem('${seatId}','laptop',this.checked)" ${state.laptop ? 'checked' : ''}> Laptop + Sạc + chuột
                </label>
                <label class="item-check" style="grid-column: span 2;">
                    <input type="checkbox" onchange="updateItem('${seatId}','laptop_tui',this.checked)" ${state.laptop_tui ? 'checked' : ''}> Laptop + Sạc + chuột + túi chống sốc
                </label>
            `;
            }
            return html;
        }

        function updateItem(id, field, isChecked) {
            if (!inventoryState[id]) initSeatState(id);
            inventoryState[id][field] = isChecked;
            saveLocal();
        }
        function updateQty(id, field, value) {
            let val = parseInt(value);
            if (isNaN(val) || val < 1) val = 1;
            if (!inventoryState[id]) initSeatState(id);
            inventoryState[id][field] = val;
            saveLocal();
        }

        function startRename(id, colKey) {
            const wrapper = document.getElementById(`name-wrap-${id}`);
            if (!wrapper) return;
            let currentName = customNames[id];
            if (!currentName) {
                if (colKey === 'leaders') currentName = layoutData.leaders.find(x => x.id === id)?.name || '';
                else currentName = layoutData[colKey].find(x => x.id === id)?.name || '';
            }

            wrapper.outerHTML = `
            <input type="text" id="rename-input-${id}" class="rename-input" value="${currentName}" 
                onblur="confirmRename('${id}', '${colKey}')" 
                onkeydown="if(event.key==='Enter') this.blur();">
        `;
            const input = document.getElementById(`rename-input-${id}`);
            if (input) {
                input.focus();
                input.select();
            }
        }

        function confirmRename(id, colKey) {
            const input = document.getElementById(`rename-input-${id}`);
            if (!input) return;
            const newName = input.value.trim();
            if (newName) {
                customNames[id] = newName;
                saveLocal();
            }
            if (colKey === 'leaders') renderLeaders();
            else renderColumn(colKey);
        }

        function markFull(id, colKey) {
            if (!inventoryState[id]) initSeatState(id);
            const s = inventoryState[id];
            s.thung = true; s.thung_qty = 1;
            s.man20 = true;
            s.chuot = true; s.chuot_qty = 1;
            s.phim = true; s.phim_qty = 1;
            s.tai = true; s.tai_qty = 1;
            if (colKey === 'leaders') s.man24 = true;

            saveLocal();
            if (colKey === 'leaders') renderLeaders();
            else renderColumn(colKey);
        }

        function resetSeat(id, colKey) {
            initSeatState(id);
            saveLocal();
            if (colKey === 'leaders') renderLeaders();
            else renderColumn(colKey);
        }

        function renderLeaders() {
            layoutData.leaders.forEach(leader => {
                const container = document.getElementById(leader.targetId);
                if (!container) return;
                const state = inventoryState[leader.id];

                container.innerHTML = `
                <div class="seat-box ${leader.fill}">
                    <div class="seat-header">
                        <div id="name-wrap-${leader.id}" class="seat-name" onclick="startRename('${leader.id}', 'leaders')" title="Nhấn để sửa tên">
                            ${customNames[leader.id] || leader.name} <span style="font-size:10px; color:#9ca3af; margin-left:4px;">✏️</span>
                        </div>
                        <div class="btn-action-group">
                            <button class="btn-mini btn-mini-success" onclick="markFull('${leader.id}', 'leaders')">Đủ bộ</button>
                            <button class="btn-mini" style="background:#e03131; color:white;" onclick="resetSeat('${leader.id}', 'leaders')">Reset</button>
                        </div>
                    </div>
                    <div class="items-grid">
                        ${getItemsHtml(leader.id, state, true)}
                    </div>
                </div>
            `;
            });
        }

        function renderColumn(colKey) {
            const container = document.getElementById(colMeta[colKey].domId);
            if (!container) return;
            let html = '';
            columnOrder[colKey].forEach(id => {
                const seat = layoutData[colKey].find(s => s.id === id);
                if (!seat) return;
                if (seat.fill === 'empty-space') {
                    html += `<div class="seat-box empty-space"></div>`;
                    return;
                }
                const state = inventoryState[id];

                html += `
                <div class="seat-box ${seat.fill}">
                    <div class="seat-header">
                        <div id="name-wrap-${seat.id}" class="seat-name" onclick="startRename('${seat.id}', '${colKey}')" title="Nhấn để sửa tên">
                            ${customNames[seat.id] || seat.name} <span style="font-size:10px; color:#9ca3af; margin-left:4px;">✏️</span>
                        </div>
                        <div class="btn-action-group">
                            <button class="btn-mini btn-mini-success" onclick="markFull('${seat.id}', '${colKey}')">Đủ bộ</button>
                            <button class="btn-mini" style="background:#e03131; color:white;" onclick="resetSeat('${seat.id}', '${colKey}')">Reset</button>
                            <button class="btn-mini btn-mini-danger" onclick="deleteSpecificSeat('${seat.id}', '${colKey}')">Xóa</button>
                        </div>
                    </div>
                    <div class="items-grid">
                        ${getItemsHtml(seat.id, state, false)}
                    </div>
                </div>
            `;
            });
            html += `
            <div class="col-actions">
                <button class="btn-col-action btn-col-add" onclick="addSeatTop('${colKey}')">➕ Thêm ở đầu</button>
                <button class="btn-col-action btn-col-remove" onclick="removeSeatTop('${colKey}')">➖ Xóa ở đầu</button>
            </div>
        `;
            container.innerHTML = html;
        }

        function addSeatTop(colKey) {
            const nextId = colMeta[colKey].prefix + '_' + Date.now();
            layoutData[colKey].unshift({ id: nextId, name: 'Vị trí mới', fill: 'fill-purple' });
            columnOrder[colKey].unshift(nextId);
            initSeatState(nextId);
            saveLocal();
            renderColumn(colKey);
        }
        function removeSeatTop(colKey) {
            if (!columnOrder[colKey].length) return;
            if (confirm('Xóa vị trí ở ĐẦU TIÊN của cột này?')) {
                const removedId = columnOrder[colKey].shift();
                layoutData[colKey] = layoutData[colKey].filter(s => s.id !== removedId);
                delete inventoryState[removedId];
                delete customNames[removedId];
                saveLocal();
                renderColumn(colKey);
            }
        }
        function deleteSpecificSeat(id, colKey) {
            if (confirm('Xóa dữ liệu kiểm kê vị trí này?')) {
                columnOrder[colKey] = columnOrder[colKey].filter(x => x !== id);
                layoutData[colKey] = layoutData[colKey].filter(s => s.id !== id);
                delete inventoryState[id];
                delete customNames[id];
                saveLocal();
                renderColumn(colKey);
            }
        }

        function renderAll() {
            renderLeaders();
            ['col1', 'col2a', 'col2b', 'col3'].forEach(k => renderColumn(k));
            updateCounts();
        }

        function updateCounts() {
            let thung = 0, man20 = 0, man24 = 0, chuot = 0, phim = 0, tai = 0, laptop = 0, laptop_tui = 0;
            Object.keys(inventoryState).forEach(id => {
                const s = inventoryState[id];
                if (s.thung) thung += (s.thung_qty || 1);
                if (s.man20) man20 += 1;
                if (s.man24) man24 += 1;
                if (s.chuot) chuot += (s.chuot_qty || 1);
                if (s.phim) phim += (s.phim_qty || 1);
                if (s.tai) tai += (s.tai_qty || 1);
                if (s.laptop) laptop += 1;
                if (s.laptop_tui) laptop_tui += 1;
            });
            document.getElementById('count-thung').innerText = thung;
            document.getElementById('count-man20').innerText = man20;
            document.getElementById('count-man24').innerText = man24;
            document.getElementById('count-chuot').innerText = chuot;
            document.getElementById('count-phim').innerText = phim;
            document.getElementById('count-tai').innerText = tai;
            document.getElementById('count-laptop').innerText = laptop;
            document.getElementById('count-laptop-tui').innerText = laptop_tui;
        }

        function exportJSON() {
            const data = { columnOrder, layoutData, inventoryState, customNames };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'inventory_lau2_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            showToast('💾 Đã xuất JSON thành công!', 'success');
        }

        function exportExcel() {
            let html = '<table border="1"><tr><th>Tên</th><th>Thùng</th><th>Màn 20"</th><th>Màn 24"</th><th>Chuột</th><th>Phím</th><th>Tai USB</th><th>Laptop + Sạc + chuột</th><th>Laptop + Sạc + chuột + túi</th></tr>';

            ['col1', 'col2a', 'col2b', 'col3'].forEach(colKey => {
                columnOrder[colKey].forEach(seatId => {
                    const seat = layoutData[colKey].find(s => s.id === seatId);
                    if (!seat || seat.id.indexOf('blank') !== -1) return;
                    const name = customNames[seatId] || seat.name || '';
                    const state = inventoryState[seatId] || {};
                    html += '<tr>';
                    html += `<td>${name}</td>`;
                    html += `<td>${state.thung ? (state.thung_qty || 1) : ''}</td>`;
                    html += `<td>${state.man20 ? 1 : ''}</td>`;
                    html += `<td>${state.man24 ? 1 : ''}</td>`;
                    html += `<td>${state.chuot ? (state.chuot_qty || 1) : ''}</td>`;
                    html += `<td>${state.phim ? (state.phim_qty || 1) : ''}</td>`;
                    html += `<td>${state.tai ? (state.tai_qty || 1) : ''}</td>`;
                    html += `<td>${state.laptop ? 1 : ''}</td>`;
                    html += `<td>${state.laptop_tui ? 1 : ''}</td>`;
                    html += '</tr>';
                });
            });
            html += '</table>';

            const blob = new Blob([html], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'inventory_lau2_' + new Date().toISOString().slice(0, 10) + '.xls';
            a.click();
            showToast('📊 Đã xuất Excel thành công!', 'success');
        }

        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    jsonData.forEach(row => {
                        const name = row['Tên'] || row['Name'] || '';
                        const seatId = ['col1', 'col2a', 'col2b', 'col3'].reduce((found, colKey) => {
                            if (found) return found;
                            return columnOrder[colKey].find(id => {
                                const seat = layoutData[colKey].find(s => s.id === id);
                                const currentName = customNames[id] || seat.name || '';
                                return currentName === name;
                            });
                        }, null);

                        if (seatId) {
                            inventoryState[seatId] = {
                                thung: row['Thùng'] ? true : false,
                                thung_qty: row['Thùng'] ? parseInt(row['Thùng']) || 1 : 1,
                                man20: row['Màn 20"'] ? true : false,
                                man24: row['Màn 24"'] ? true : false,
                                chuot: row['Chuột'] ? true : false,
                                chuot_qty: row['Chuột'] ? parseInt(row['Chuột']) || 1 : 1,
                                phim: row['Phím'] ? true : false,
                                phim_qty: row['Phím'] ? parseInt(row['Phím']) || 1 : 1,
                                tai: row['Tai USB'] ? true : false,
                                tai_qty: row['Tai USB'] ? parseInt(row['Tai USB']) || 1 : 1,
                                laptop: row['Laptop + Sạc + chuột'] ? true : false,
                                laptop_tui: row['Laptop + Sạc + chuột + túi'] ? true : false
                            };
                        }
                    });
                    saveLocal();
                    renderAll();
                    showToast('📊 Đã nhập Excel thành công!', 'success');
                } catch (err) {
                    showToast('❌ File Excel không hợp lệ! Vui lòng dùng thư viện XLSX.', 'error');
                }
            };
            reader.readAsBinaryString(file);
            event.target.value = '';
        }
        function searchEmployee() {
            const val = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.seat-box').forEach(box => {
                const nameEl = box.querySelector('.seat-name');
                if (nameEl && nameEl.innerText.toLowerCase().includes(val)) {
                    box.style.display = 'block';
                } else if (nameEl) {
                    box.style.display = 'none';
                }
            });
        }

        let toastTimeout;
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'show type-' + type;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                t.className = 'hide type-' + type;
            }, 3000);
        }

        // Khởi chạy khi load trang
        loadData();
    </script>
</body>
