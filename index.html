<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Kê Tài Sản - Sàn Lầu 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --bg: #f4f6fa;
            --surface: #ffffff;
            --surface-alt: #f8f9fc;
            --border: #e2e6ef;
            --text-primary: #1a1d2e;
            --text-secondary: #4a5568;
            --text-muted: #9ca3af;
            --blue: #3b5bdb;
            --blue-light: #eef2ff;
            --blue-dark: #2f4ac0;
            --green: #2f9e44;
            --green-light: #ebfbee;
            --green-dark: #1b4332;
            --red: #e03131;
            --red-light: #fff5f5;
            --yellow: #f59f00;
            --yellow-light: #fff9db;
            --purple: #7048e8;
            --pink-bg: #fff0f6;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.10);
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 1640px; margin: 0 auto; }
        
        /* Header */
        .page-header { background: linear-gradient(135deg, #1a1d2e 0%, #2d3561 60%, #3b5bdb 100%); border-radius: 14px; padding: 28px 36px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; box-shadow: var(--shadow-lg); }
        .page-header-left h1 { color: #fff; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .page-header-left p { color: rgba(255,255,255,0.65); font-size: 13px; margin-top: 4px; }
        .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        
        /* Dashboard Stats */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
        .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
        .stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .stat-icon.blue { background: var(--blue-light); }
        .stat-icon.green { background: var(--green-light); }
        .stat-icon.red { background: var(--red-light); }
        .stat-icon.yellow { background: var(--yellow-light); }
        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--text-primary); }

        /* Controls Panel */
        .controls-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; box-shadow: var(--shadow-sm); }
        .search-wrap { position: relative; }
        .search-wrap input { padding: 9px 12px 9px 34px; width: 280px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--surface-alt); }
        .search-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 13px; transition: all .15s; }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-danger { background: #fff; color: var(--red); border: 1px solid #fca5a5; }
        .btn-sync { background: linear-gradient(135deg, #3b5bdb, #7048e8); color: #fff; }

        /* Grid Layout */
        .layout-grid { display: grid; grid-template-columns: 1fr 38px 1fr 1fr 38px 1fr; gap: 12px; margin-bottom: 4px; }
        .aisle { background: linear-gradient(180deg, #e9ecef, #dee2e6); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #8a9ab0; border-radius: 6px; writing-mode: vertical-rl; text-orientation: upright; font-size: 11px; border: 1px dashed #c8d0db; }
        .col-wrapper { display: flex; flex-direction: column; gap: 0; }
        .seat-column { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }

        /* Seat Box Styling */
        .seat-box { background: var(--surface); border-radius: var(--radius); padding: 12px; position: relative; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: all 0.2s ease; }
        
        /* Màu sắc Trạng thái Mới áp dụng chuẩn đồ họa */
        .seat-box.full-equipped-20 { background-color: #e8f5e9 !important; border: 2px solid #2e7d32 !important; box-shadow: 0 4px 10px rgba(46,125,50,0.1); }
        .seat-box.full-equipped-20 .seat-name { color: #1b5e20 !important; }
        
        .seat-box.missing-equipped { background-color: #fff5f5 !important; border: 2px solid #e03131 !important; box-shadow: 0 4px 10px rgba(224,49,49,0.1); }
        .seat-box.missing-equipped .seat-name { color: #c92a2a !important; }

        .seat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .seat-name { font-weight: 700; font-size: 13px; color: var(--text-primary); cursor: pointer; }
        .seat-name:hover { text-decoration: underline; }
        .rename-input { font-weight: 700; font-size: 12px; border: 1.5px solid var(--blue); border-radius: 4px; padding: 2px 6px; outline: none; width: 100%; }

        /* Items Checkbox Grid */
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: rgba(248, 249, 252, 0.8); padding: 8px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.02); }
        .item-check { display: flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 500; color: var(--text-secondary); }
        .item-check input[type=checkbox] { cursor: pointer; width: 14px; height: 14px; accent-color: var(--green); }
        .qty-input { width: 34px; padding: 1px; font-size: 10px; border: 1px solid var(--border); border-radius: 4px; text-align: center; margin-left: auto; }

        /* Actions Column */
        .col-actions { display: flex; gap: 6px; margin-top: 8px; margin-bottom: 8px; justify-content: center; }
        .btn-col-action { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 11px; background: var(--surface); color: var(--text-secondary); transition: all .15s; }
        .btn-col-add:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
        .btn-col-remove:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

        .btn-mini { padding: 3px 8px; font-size: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-mini-success { background: var(--green); color: #fff; }
        .btn-mini-danger { background: #e5e7eb; color: #6b7280; }
        .btn-mini-danger:hover { background: #fca5a5; color: var(--red); }

        /* Footer & Deploy Link Config */
        .footer-panel { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .deploy-url-wrap { width: 100%; max-width: 650px; background: var(--surface); padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .deploy-url-wrap label { font-size: 12px; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 6px; }
        .deploy-url-input-group { display: flex; gap: 8px; }
        .deploy-url-input-group input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; outline: none; font-family: monospace; }
        .copyright { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 8px; letter-spacing: 0.5px; }

        #toast { position: fixed; bottom: 28px; right: 28px; background: #1a1d2e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); display: none; z-index: 9999; }
        #toast.show { display: block; animation: fadeInUp 0.3s ease; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="toast"></div>

<div class="container">
    <div class="page-header">
        <div class="page-header-left">
            <h1>🖥️ SÀN LẦU 2 — Kiểm Kê Thiết Bị</h1>
            <p>Hệ thống sơ đồ & kiểm kê tài sản phòng máy tự động</p>
        </div>
        <div class="header-right">
            <span class="header-badge" id="last-saved">Chưa lưu thay đổi</span>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card"><div class="stat-icon blue">🪑</div><div class="stat-label">Tổng vị trí</div><div class="stat-value" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-label">Đủ thiết bị (Đủ bộ)</div><div class="stat-value" id="stat-full">0</div></div>
        <div class="stat-card"><div class="stat-icon red">⚠️</div><div class="stat-label">Thiếu thiết bị</div><div class="stat-value" id="stat-missing">0</div></div>
        <div class="stat-card"><div class="stat-icon yellow">📊</div><div class="stat-label">Tỷ lệ hoàn thành</div><div class="stat-value" id="stat-percent">0%</div></div>
    </div>

    <div class="controls-panel">
        <div class="search-wrap">
            <span class="icon">🔍</span>
            <input type="text" id="search-input" placeholder="Tìm kiếm tên nhân viên..." oninput="searchEmployee()">
        </div>
        <div class="btn-group">
            <button class="btn btn-sync" onclick="syncNow()">☁️ Đồng bộ ngay</button>
            <button class="btn btn-primary" onclick="exportJSON()">💾 Xuất backup</button>
            <button class="btn btn-danger" onclick="resetAllInventory()">🗑️ Reset tất cả</button>
        </div>
    </div>

    <div class="layout-grid">
        <div class="col-actions">
            <button class="btn-col-action btn-col-add" onclick="addSeatTop('col1')">＋ Thêm vị trí đầu</button>
            <button class="btn-col-action btn-col-remove" onclick="removeSeatTop('col1')">－ Xóa vị trí đầu</button>
        </div>
        <div></div>
        <div class="col-actions">
            <button class="btn-col-action btn-col-add" onclick="addSeatTop('col2a')">＋ Thêm vị trí đầu</button>
            <button class="btn-col-action btn-col-remove" onclick="removeSeatTop('col2a')">－ Xóa vị trí đầu</button>
        </div>
        <div class="col-actions">
            <button class="btn-col-action btn-col-add" onclick="addSeatTop('col2b')">＋ Thêm vị trí đầu</button>
            <button class="btn-col-action btn-col-remove" onclick="removeSeatTop('col2b')">－ Xóa vị trí đầu</button>
        </div>
        <div></div>
        <div class="col-actions">
            <button class="btn-col-action btn-col-add" onclick="addSeatTop('col3')">＋ Thêm vị trí đầu</button>
            <button class="btn-col-action btn-col-remove" onclick="removeSeatTop('col3')">－ Xóa vị trí đầu</button>
        </div>
    </div>

    <div class="layout-grid" id="main-grid">
        <div class="col-wrapper"><div class="seat-column" id="col-1" data-col="col1"></div></div>
        <div class="aisle">LỐI ĐI</div>
        <div class="col-wrapper"><div class="seat-column" id="col-2a" data-col="col2a"></div></div>
        <div class="col-wrapper"><div class="seat-column" id="col-2b" data-col="col2b"></div></div>
        <div class="aisle">LỐI ĐI</div>
        <div class="col-wrapper"><div class="seat-column" id="col-3" data-col="col3"></div></div>
    </div>
    
    <div class="footer-panel">
        <div class="deploy-url-wrap">
            <label for="gas-url-bottom">🔗 ĐƯỜNG DẪN TRIỂN KHAI APPS SCRIPT (WEB APP URL):</label>
            <div class="deploy-url-input-group">
                <input type="text" id="gas-url-bottom" placeholder="https://script.google.com/macros/s/.../exec" onchange="updateDeployUrl(this.value)">
                <button class="btn btn-primary" style="padding: 0 14px;" onclick="showToast('💾 Đã ghi nhận URL cấu hình mới!','success')">Lưu cấu hình</button>
            </div>
        </div>
        <div class="copyright">Đặng Công Chính - ShopeeFood © 2026</div>
    </div>
</div>

<script>
    // ── DATABASE CONFIGURATION ───────────────────────────────────────
    let layoutData = {
        col1: [],
        col2a: [],
        col2b: [],
        col3: []
    };

    const colMeta = {
        col1: { domId: 'col-1', prefix: 'C1' },
        col2a: { domId: 'col-2a', prefix: 'C2A' },
        col2b: { domId: 'col-2b', prefix: 'C2B' },
        col3: { domId: 'col-3', prefix: 'C3' }
    };

    let columnOrder = { col1: [], col2a: [], col2b: [], col3: [] };
    let inventoryState = {};
    let customNames = {};
    let gasUrl = 'https://script.google.com/macros/s/AKfycbzvSHG8V58sygXBWu2fdPQ_KDuUwKs7p_Gx6eLpNOW_i9cuvm6tCew_LSNLbM8skOmW/exec';

    const STORAGE_KEY = 'floor2_inventory_v4_sys';

    // ── INITIALIZATION ──────────────────────────────────────────────
    function saveLocal() {
        const payload = {
            columnOrder,
            layoutData,
            inventoryState,
            customNames,
            gasUrl
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        document.getElementById('last-saved').textContent = 'Đã lưu: ' + new Date().toLocaleTimeString();
        calculateStats();
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const data = JSON.parse(raw);
                if (data.columnOrder) columnOrder = data.columnOrder;
                if (data.layoutData) layoutData = data.layoutData;
                if (data.inventoryState) inventoryState = data.inventoryState;
                if (data.customNames) customNames = data.customNames;
                if (data.gasUrl) {
                    gasUrl = data.gasUrl;
                    document.getElementById('gas-url-bottom').value = gasUrl;
                }
            } catch (e) {
                console.error("Lỗi parse LocalStorage, đang thiết lập cấu trúc trống.", e);
            }
        } else {
            // Khởi tạo 4 vị trí mẫu ban đầu cho trực quan
            ['col1', 'col2a', 'col2b', 'col3'].forEach(k => {
                const id = colMeta[k].prefix + '_' + Date.now() + '_' + Math.floor(Math.random()*100);
                layoutData[k].push({ id: id, name: 'Vị trí trống' });
                columnOrder[k].push(id);
                initSeatState(id);
            });
            document.getElementById('gas-url-bottom').value = gasUrl;
            saveLocal();
        }
    }

    function updateDeployUrl(val) {
        gasUrl = val.trim();
        saveLocal();
        showToast('🔗 Đã cập nhật URL Deploy thành công!', 'success');
    }

    function initSeatState(id) {
        if (!inventoryState[id]) {
            inventoryState[id] = {
                thung: false,
                man20: false,
                man24: false,
                chuot: false, chuot_qty: 1,
                phim: false, phim_qty: 1,
                tai: false
            };
        }
    }

    // ── RENDER ENGINE ────────────────────────────────────────────────
    function renderColumn(colKey) {
        const meta = colMeta[colKey];
        const colEl = document.getElementById(meta.domId);
        colEl.innerHTML = '';
        
        columnOrder[colKey].forEach(id => {
            const seat = layoutData[colKey].find(s => s.id === id);
            if (seat) {
                colEl.appendChild(createSeatBoxElement(seat, colKey));
            }
        });
    }

    function createSeatBoxElement(seat, colKey) {
        const id = seat.id;
        initSeatState(id);
        const state = inventoryState[id];
        const displayName = customNames[id] || seat.name;

        // Định nghĩa kiểm tra Logic màu sắc cảnh báo theo yêu cầu:
        // Đủ bộ = Thùng, Chuột, Phím, Tai, và Màn 20 (Màn 24 hủy chọn) -> Màu xanh lá đậm
        // Ngược lại nếu thiếu bất kỳ cái nào trong 5 cái lõi trên -> Màu đỏ nổi bật
        const hasCore = state.thung && state.chuot && state.phim && state.tai && state.man20;
        
        let stateClass = '';
        if (hasCore && !state.man24) {
            stateClass = 'full-equipped-20';
        } else if (!hasCore) {
            stateClass = 'missing-equipped';
        }

        const box = document.createElement('div');
        box.id = 'seat-box-' + id;
        box.className = `seat-box ${stateClass}`;

        box.innerHTML = `
            <div class="seat-header">
                <span class="seat-name" id="name-${id}" onclick="startRename('${id}','${colKey}')">${displayName}</span>
                <div class="btn-action-group">
                    <button class="btn-mini btn-mini-success" onclick="selectFullKit('${id}','${colKey}')">Đủ bộ</button>
                    <button class="btn-mini btn-mini-danger" onclick="deleteSpecificSeat('${id}','${colKey}')">Xóa</button>
                </div>
            </div>
            <div class="items-grid">
                <div class="item-check">
                    <input type="checkbox" ${state.thung?'checked':''} onchange="toggleDevice('${id}','thung','${colKey}')">
                    <span>Thùng CPU</span>
                </div>
                <div class="item-check">
                    <input type="checkbox" ${state.man20?'checked':''} onchange="toggleDevice('${id}','man20','${colKey}')">
                    <span style="font-weight:600;color:var(--purple);">Màn hình 20"</span>
                </div>
                <div class="item-check">
                    <input type="checkbox" ${state.man24?'checked':''} onchange="toggleDevice('${id}','man24','${colKey}')">
                    <span style="font-weight:600;color:#2f9e44;">Màn hình 24"</span>
                </div>
                <div class="item-check">
                    <input type="checkbox" ${state.chuot?'checked':''} onchange="toggleDevice('${id}','chuot','${colKey}')">
                    <span>Chuột</span>
                    <input type="number" class="qty-input" value="${state.chuot_qty||1}" min="1" onchange="changeQty('${id}','chuot',this.value,'${colKey}')">
                </div>
                <div class="item-check">
                    <input type="checkbox" ${state.phim?'checked':''} onchange="toggleDevice('${id}','phim','${colKey}')">
                    <span>Bàn phím</span>
                    <input type="number" class="qty-input" value="${state.phim_qty||1}" min="1" onchange="changeQty('${id}','phim',this.value,'${colKey}')">
                </div>
                <div class="item-check">
                    <input type="checkbox" ${state.tai?'checked':''} onchange="toggleDevice('${id}','tai','${colKey}')">
                    <span>Tai nghe USB</span>
                </div>
            </div>
        `;
        return box;
    }

    function renderAll() {
        ['col1', 'col2a', 'col2b', 'col3'].forEach(k => renderColumn(k));
        calculateStats();
    }

    // ── LOGIC OPERATIONS ────────────────────────────────────────────
    function toggleDevice(id, key, colKey) {
        inventoryState[id][key] = !inventoryState[id][key];
        saveLocal();
        renderColumn(colKey);
    }

    function changeQty(id, key, val, colKey) {
        inventoryState[id][key + '_qty'] = parseInt(val) || 1;
        saveLocal();
    }

    // Thiết lập tính năng "Đủ bộ" thông minh theo đúng mô tả của bạn
    function selectFullKit(id, colKey) {
        inventoryState[id].thung = true;
        inventoryState[id].man20 = true;
        inventoryState[id].man24 = false; // Ngoại trừ Màn hình 24"
        inventoryState[id].chuot = true;
        inventoryState[id].phim = true;
        inventoryState[id].tai = true;
        
        saveLocal();
        renderColumn(colKey);
        showToast('✨ Đã thiết lập cấu hình Đủ bộ chuẩn!', 'success');
    }

    // Thêm vị trí mới vào ĐẦU danh sách hàng đợi của cột
    function addSeatTop(colKey) {
        const meta = colMeta[colKey];
        const nextId = meta.prefix + '_' + Date.now() + '_' + Math.floor(Math.random() * 100);
        
        // Chèn vào đầu mảng cấu trúc dữ liệu
        layoutData[colKey].unshift({ id: nextId, name: 'Vị trí mới' });
        columnOrder[colKey].unshift(nextId);
        
        initSeatState(nextId);
        saveLocal();
        renderColumn(colKey);
        showToast('➕ Đã chèn thêm chỗ ngồi mới ở đầu cột', 'success');
    }

    function removeSeatTop(colKey) {
        if(columnOrder[colKey].length === 0) {
            showToast('⚠️ Cột này hiện đang rỗng!', 'warn');
            return;
        }
        if(confirm('Bạn có chắc chắn muốn xóa vị trí ở ĐẦU TIÊN của cột này không?')) {
            const removedId = columnOrder[colKey].shift();
            layoutData[colKey] = layoutData[colKey].filter(s => s.id !== removedId);
            delete inventoryState[removedId];
            delete customNames[removedId];
            
            saveLocal();
            renderColumn(colKey);
            showToast('➖ Đã gỡ bỏ vị trí đầu tiên', 'info');
        }
    }

    function deleteSpecificSeat(id, colKey) {
        if(confirm('Xóa dữ liệu kiểm kê vị trí này?')) {
            columnOrder[colKey] = columnOrder[colKey].filter(x => x !== id);
            layoutData[colKey] = layoutData[colKey].filter(s => s.id !== id);
            delete inventoryState[id];
            delete customNames[id];
            
            saveLocal();
            renderColumn(colKey);
            showToast('🗑️ Đã xóa vị trí chỉ định', 'info');
        }
    }

    function startRename(id, colKey) {
        const nameEl = document.getElementById('name-' + id);
        if (!nameEl) return;
        
        const currentName = customNames[id] || "Vị trí trống";
        const input = document.createElement('input');
        input.type = 'text';
        input.value = currentName === 'Vị trí trống' ? '' : currentName;
        input.className = 'rename-input';

        let finished = false;
        function saveName() {
            if (finished) return;
            finished = true;
            const newVal = input.value.trim();
            if (newVal) {
                customNames[id] = newVal;
            } else {
                customNames[id] = 'Vị trí trống';
            }
            saveLocal();
            renderColumn(colKey);
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') saveName();
            if (e.key === 'Escape') { finished = true; renderColumn(colKey); }
        });
        input.addEventListener('blur', saveName);
        
        nameEl.innerHTML = '';
        nameEl.appendChild(input);
        input.focus();
    }

    // ── CALCULATION & METRICS ────────────────────────────────────────
    function calculateStats() {
        let total = 0;
        let fullKitCount = 0;
        let missingKitCount = 0;

        ['col1', 'col2a', 'col2b', 'col3'].forEach(k => {
            columnOrder[k].forEach(id => {
                total++;
                const state = inventoryState[id];
                if(state) {
                    const hasCore = state.thung && state.chuot && state.phim && state.tai && state.man20;
                    if(hasCore && !state.man24) {
                        fullKitCount++;
                    } else {
                        missingKitCount++;
                    }
                }
            });
        });

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-full').textContent = fullKitCount;
        document.getElementById('stat-missing').textContent = missingKitCount;
        document.getElementById('stat-percent').textContent = total > 0 ? Math.round((fullKitCount / total) * 100) + '%' : '0%';
    }

    function searchEmployee() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        document.querySelectorAll('.seat-box').forEach(b => b.style.border = '');
        if(!q) return;

        ['col1', 'col2a', 'col2b', 'col3'].forEach(k => {
            columnOrder[k].forEach(id => {
                const name = (customNames[id] || '').toLowerCase();
                if(name.includes(q)) {
                    const box = document.getElementById('seat-box-' + id);
                    if(box) {
                        box.style.border = '3px dashed #f59f00';
                        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        });
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'show';
        setTimeout(() => t.className = '', 3000);
    }

    function exportJSON() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return showToast('Không có dữ liệu lưu trữ để export!', 'warn');
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(raw);
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", `Backup_KiemKe_Floor2_${new Date().toISOString().slice(0,10)}.json`);
        dl.click();
    }

    function resetAllInventory() {
        if(confirm('CẢNH BÁO: Hành động này sẽ dọn sạch toàn bộ dữ liệu cấu hình hiện tại về mặc định. Tiến hành?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    async function syncNow() {
        if(!gasUrl || gasUrl.includes('...')) {
            showToast('⚠️ Vui lòng cấu hình URL Apps Script Web App ở cuối trang trước!', 'warn');
            return;
        }
        showToast('☁️ Đang đồng bộ dữ liệu đám mây...', 'info');
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            const response = await fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: raw
            });
            showToast('✅ Đã gửi lệnh đồng bộ lên Google Sheets!', 'success');
        } catch(e) {
            showToast('❌ Lỗi kết nối không phản hồi. Hãy kiểm tra lại URL.', 'warn');
        }
    }

    // Khởi chạy tiến trình nạp dữ liệu
    loadState();
    renderAll();
</script>
</body>
</html>
